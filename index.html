<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Double Round Robin Chess | Proper Pairings</title>
</head>
<body>

<h2>MEN</h2>
<div id="menPlayers"></div>
<input type="text" id="newMenName" placeholder="Player name">
<button onclick="addMen()">Add</button>
<button onclick="removeLastMen()">Remove Last</button>

<h2>WOMEN</h2>
<div id="womenPlayers"></div>
<input type="text" id="newWomenName" placeholder="Player name">
<button onclick="addWomen()">Add</button>
<button onclick="removeLastWomen()">Remove Last</button>

<hr>

<h2>PAIRINGS BY ROUND</h2>

<h3>MEN</h3>
<div id="menPairings"></div>

<h3>WOMEN</h3>
<div id="womenPairings"></div>

<hr>
<button onclick="resetAllScores()">Reset All Scores</button>

<script>
  // ========== DATA ==========
  let men = [
    "NIRISH KUMAR",
    "RISHIKESH KUMAR",
    "AMIRTHEN",
    "DAMIEN STEVE JOHNSON",
    "AHMAD NAUFAL",
    "MUHAMMAD IRSYAD"
  ];

  let women = [
    "LYANNE KONG JING THUNG",
    "MATHIVATHANE",
    "HOVIYEAMATHY",
    "TAVAMATHIE",
    "NURUL SHAFIKAH",
    "LINGGESWARY"
  ];

  // scores: white[i][j] = result when i has white vs j
  // null = not played, 0=loss, 0.5=draw, 1=win
  let menWhite = [];
  let womenWhite = [];

  function initWhiteArray(players) {
    let n = players.length;
    let arr = Array(n).fill().map(() => Array(n).fill(null));
    for (let i = 0; i < n; i++) {
      for (let j = 0; j < n; j++) {
        if (i !== j) arr[i][j] = null;
      }
    }
    return arr;
  }

  function reinitScores() {
    menWhite = initWhiteArray(men);
    womenWhite = initWhiteArray(women);
  }
  reinitScores();

  // ========== GET/SET SCORES ==========
  function getWhite(group, i, j) {
    if (group === 'men') return menWhite[i]?.[j] ?? null;
    return womenWhite[i]?.[j] ?? null;
  }

  function setWhite(group, i, j, val) {
    if (group === 'men') {
      if (!menWhite[i]) menWhite[i] = [];
      menWhite[i][j] = val;
    } else {
      if (!womenWhite[i]) womenWhite[i] = [];
      womenWhite[i][j] = val;
    }
  }

  function getBlack(group, i, j) {
    let whiteOfJ = getWhite(group, j, i);
    return whiteOfJ === null ? null : 1 - whiteOfJ;
  }

  function cycleScore(current) {
    if (current === null) return 0;
    if (current === 0) return 0.5;
    if (current === 0.5) return 1;
    return null;
  }

  // ========== PROPER ROUND ROBIN PAIRING GENERATOR ==========
  // Returns array of rounds. Each round is array of matches { white, black, whiteIdx, blackIdx }
  // Standard circle method for round robin.
  function generateRoundRobinPairings(players) {
    let n = players.length;
    if (n < 2) return [];
    
    let isOdd = n % 2 === 1;
    let virtualPlayers = [...players];
    if (isOdd) virtualPlayers.push("BYE");
    let m = virtualPlayers.length;
    
    let rounds = [];
    let totalRounds = m - 1;
    
    for (let round = 0; round < totalRounds; round++) {
      let matches = [];
      for (let i = 0; i < m / 2; i++) {
        let whiteIdx = i;
        let blackIdx = m - 1 - i;
        if (whiteIdx !== blackIdx) {
          let whiteName = virtualPlayers[whiteIdx];
          let blackName = virtualPlayers[blackIdx];
          if (whiteName !== "BYE" && blackName !== "BYE") {
            matches.push({
              white: whiteName,
              black: blackName,
              whiteIdx: players.indexOf(whiteName),
              blackIdx: players.indexOf(blackName)
            });
          }
        }
      }
      rounds.push(matches);
      
      // rotate: keep first player fixed, rotate rest
      let last = virtualPlayers.pop();
      virtualPlayers.splice(1, 0, last);
    }
    return rounds;
  }

  // Double round robin: first cycle (standard), second cycle with colors swapped
  function generateDoubleRoundRobinPairings(players) {
    let firstCycle = generateRoundRobinPairings(players);
    let secondCycle = generateRoundRobinPairings(players);
    
    // swap colors in second cycle
    for (let r = 0; r < secondCycle.length; r++) {
      for (let m of secondCycle[r]) {
        let temp = m.white;
        m.white = m.black;
        m.black = temp;
        let tempIdx = m.whiteIdx;
        m.whiteIdx = m.blackIdx;
        m.blackIdx = tempIdx;
      }
    }
    
    // combine: round 1A, round 1B, round 2A, round 2B...
    let doubleRounds = [];
    for (let i = 0; i < firstCycle.length; i++) {
      doubleRounds.push(firstCycle[i]);
      doubleRounds.push(secondCycle[i]);
    }
    return doubleRounds;
  }

  // ========== STANDINGS ==========
  function getStandings(group, players) {
    let stats = [];
    for (let i = 0; i < players.length; i++) {
      let total = 0, wins = 0, draws = 0, losses = 0;
      for (let j = 0; j < players.length; j++) {
        if (i === j) continue;
        let white = getWhite(group, i, j);
        let black = getBlack(group, i, j);
        if (white !== null) {
          total += white;
          if (white === 1) wins++;
          else if (white === 0.5) draws++;
          else losses++;
        }
        if (black !== null) {
          total += black;
          if (black === 1) wins++;
          else if (black === 0.5) draws++;
          else losses++;
        }
      }
      stats.push({ name: players[i], points: total, wins, draws, losses });
    }
    stats.sort((a, b) => {
      if (a.points !== b.points) return b.points - a.points;
      return b.wins - a.wins;
    });
    return stats;
  }

  // ========== RENDER ==========
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function renderPlayersList(containerId, players, groupLabel) {
    let container = document.getElementById(containerId);
    if (!container) return;
    let html = '';
    for (let i = 0; i < players.length; i++) {
      html += `<span style="display:inline-block; border:1px solid #999; padding:4px 10px; margin:4px; border-radius:20px;">${escapeHtml(players[i])}</span>`;
    }
    container.innerHTML = html;
  }

  function renderPairings(containerId, group, players) {
    let container = document.getElementById(containerId);
    if (!container) return;
    
    if (players.length < 2) {
      container.innerHTML = "<i>Need at least 2 players</i>";
      return;
    }
    
    let pairings = generateDoubleRoundRobinPairings(players);
    
    let html = `<p><b>Total rounds: ${pairings.length}</b> (each player plays once per round, colors alternate across two cycles)</p>`;
    
    for (let r = 0; r < pairings.length; r++) {
      html += `<div style="margin-bottom: 20px; border:1px solid #ccc; padding:10px; background:#f9f9f9;">`;
      html += `<h4>Round ${r + 1}</h4>`;
      html += `<table border="1" cellpadding="5" cellspacing="0" style="border-collapse:collapse">`;
      html += `<tr><th>White</th><th>Black</th><th>Result (White's score)</th></tr>`;
      
      for (let m of pairings[r]) {
        let whiteScore = getWhite(group, m.whiteIdx, m.blackIdx);
        let display = whiteScore === null ? "○" : (whiteScore === 0 ? "0" : (whiteScore === 0.5 ? "½" : "1"));
        html += `<tr>
          <td>${escapeHtml(m.white)}</td>
          <td>${escapeHtml(m.black)}</td>
          <td><button onclick="cycleWhiteResult('${group}', ${m.whiteIdx}, ${m.blackIdx})">${display}</button></td>
        </tr>`;
      }
      html += `</table></div>`;
    }
    
    // standings
    let stats = getStandings(group, players);
    html += `<h4>Standings</h4>`;
    html += `<table border="1" cellpadding="3" cellspacing="0" style="border-collapse:collapse">`;
    html += `<tr><th>Rank</th><th>Player</th><th>W</th><th>D</th><th>L</th><th>Total</th></tr>`;
    for (let s = 0; s < stats.length; s++) {
      html += `<tr>
        <td>${s+1}</td>
        <td>${escapeHtml(stats[s].name)}</td>
        <td>${stats[s].wins}</td>
        <td>${stats[s].draws}</td>
        <td>${stats[s].losses}</td>
        <td><b>${stats[s].points.toFixed(1)}</b></td>
      </tr>`;
    }
    html += `</table>`;
    
    container.innerHTML = html;
  }

  window.cycleWhiteResult = function(group, whiteIdx, blackIdx) {
    let current = getWhite(group, whiteIdx, blackIdx);
    let next = cycleScore(current);
    setWhite(group, whiteIdx, blackIdx, next);
    renderAll();
  };

  function renderAll() {
    renderPlayersList("menPlayers", men, "men");
    renderPlayersList("womenPlayers", women, "women");
    renderPairings("menPairings", "men", men);
    renderPairings("womenPairings", "women", women);
  }

  // ========== ADD/REMOVE ==========
  window.addMen = function() {
    let input = document.getElementById("newMenName");
    let name = input.value.trim();
    if (name && !men.some(p => p.toLowerCase() === name.toLowerCase())) {
      men.push(name);
      menWhite = initWhiteArray(men);
      renderAll();
      input.value = "";
    } else if (name) alert("Duplicate");
  };
  
  window.addWomen = function() {
    let input = document.getElementById("newWomenName");
    let name = input.value.trim();
    if (name && !women.some(p => p.toLowerCase() === name.toLowerCase())) {
      women.push(name);
      womenWhite = initWhiteArray(women);
      renderAll();
      input.value = "";
    } else if (name) alert("Duplicate");
  };
  
  window.removeLastMen = function() {
    if (men.length > 0) men.pop();
    menWhite = initWhiteArray(men);
    renderAll();
  };
  
  window.removeLastWomen = function() {
    if (women.length > 0) women.pop();
    womenWhite = initWhiteArray(women);
    renderAll();
  };
  
  window.resetAllScores = function() {
    menWhite = initWhiteArray(men);
    womenWhite = initWhiteArray(women);
    renderAll();
  };

  renderAll();
</script>

</body>
</html>
