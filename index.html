<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Double Round Robin Chess</title>
</head>
<body>

<h2>MEN</h2>
<div id="menPlayers"></div>
<button onclick="addMen()">+ Add Men</button>
<input type="text" id="newMenName" placeholder="Player name">
<br><br>

<h2>WOMEN</h2>
<div id="womenPlayers"></div>
<button onclick="addWomen()">+ Add Women</button>
<input type="text" id="newWomenName" placeholder="Player name">
<br><br>

<hr>

<h2>PAIRINGS & SCORES</h2>

<h3>MEN</h3>
<div id="menPairings"></div>

<h3>WOMEN</h3>
<div id="womenPairings"></div>

<hr>
<button onclick="resetAllScores()">Reset All Scores</button>

<script>
  // ========== DATA ==========
  let men = [
    "NIRISH KUMAR",
    "RISHIKESH KUMAR",
    "AMIRTHEN",
    "DAMIEN STEVE JOHNSON",
    "AHMAD NAUFAL",
    "MUHAMMAD IRSYAD"
  ];

  let women = [
    "LYANNE KONG JING THUNG",
    "MATHIVATHANE",
    "HOVIYEAMATHY",
    "TAVAMATHIE",
    "NURUL SHAFIKAH",
    "LINGGESWARY"
  ];

  // scores: { "groupName": { "i,j": { white: score, black: score } } }
  // score: 0=loss, 0.5=draw, 1=win, null=not played
  let scores = {
    men: {},
    women: {}
  };

  function initScoresForGroup(group, players) {
    let groupScores = {};
    for (let i = 0; i < players.length; i++) {
      for (let j = i + 1; j < players.length; j++) {
        let key = i + "," + j;
        groupScores[key] = { white: null, black: null };
      }
    }
    scores[group] = groupScores;
  }

  function reinitAllScores() {
    initScoresForGroup("men", men);
    initScoresForGroup("women", women);
  }

  // initial
  reinitAllScores();

  // ========== HELPERS ==========
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // get white score for i vs j (i plays white vs j)
  function getWhiteScore(group, i, j) {
    if (i === j) return null;
    let a = Math.min(i, j);
    let b = Math.max(i, j);
    let key = a + "," + b;
    let pair = scores[group][key];
    if (!pair) return null;
    if (i < j) return pair.white;
    else return pair.black;
  }

  // set white score for i vs j (i plays white vs j)
  function setWhiteScore(group, i, j, value) {
    if (i === j) return;
    let a = Math.min(i, j);
    let b = Math.max(i, j);
    let key = a + "," + b;
    if (!scores[group][key]) scores[group][key] = { white: null, black: null };
    if (i < j) scores[group][key].white = value;
    else scores[group][key].black = value;
  }

  // get black score for i vs j (i plays black vs j) = 1 - white score of j vs i
  function getBlackScore(group, i, j) {
    if (i === j) return null;
    let whiteOfJ = getWhiteScore(group, j, i);
    return whiteOfJ === null ? null : 1 - whiteOfJ;
  }

  // set black score directly (for cycling)
  function setBlackScore(group, i, j, value) {
    if (i === j) return;
    // black score for i vs j = white score for j vs i should be 1 - value
    let newWhiteForJ = value === null ? null : 1 - value;
    setWhiteScore(group, j, i, newWhiteForJ);
  }

  // cycle score: null -> 0 -> 0.5 -> 1 -> null
  function cycleScore(current) {
    if (current === null) return 0;
    if (current === 0) return 0.5;
    if (current === 0.5) return 1;
    return null;
  }

  // ========== STANDINGS ==========
  function getStandings(group, players) {
    let stats = [];
    for (let i = 0; i < players.length; i++) {
      let total = 0;
      let wins = 0;
      let draws = 0;
      let losses = 0;
      for (let j = 0; j < players.length; j++) {
        if (i === j) continue;
        let white = getWhiteScore(group, i, j);
        let black = getBlackScore(group, i, j);
        if (white !== null) {
          total += white;
          if (white === 1) wins++;
          else if (white === 0.5) draws++;
          else losses++;
        }
        if (black !== null) {
          total += black;
          if (black === 1) wins++;
          else if (black === 0.5) draws++;
          else losses++;
        }
      }
      stats.push({ name: players[i], points: total, wins: wins, draws: draws, losses: losses });
    }
    stats.sort((a, b) => {
      if (a.points !== b.points) return b.points - a.points;
      return b.wins - a.wins;
    });
    return stats;
  }

  // ========== RENDER PLAYERS LIST ==========
  function renderPlayersList(containerId, players, groupName, addCallback) {
    let container = document.getElementById(containerId);
    if (!container) return;
    let html = "";
    for (let i = 0; i < players.length; i++) {
      html += `<span style="display:inline-block; border:1px solid #ccc; padding:4px 8px; margin:4px; border-radius:20px;">${escapeHtml(players[i])} <button onclick="removePlayer('${groupName}', ${i})">x</button></span>`;
    }
    container.innerHTML = html;
  }

  // ========== RENDER PAIRINGS (all matches with two games) ==========
  function renderPairings(containerId, groupName, players) {
    let container = document.getElementById(containerId);
    if (!container) return;
    if (players.length < 2) {
      container.innerHTML = "<i>Need at least 2 players</i>";
      return;
    }

    let html = "<table border='1' cellpadding='5' cellspacing='0' style='border-collapse:collapse'>";
    html += "<tr><th>#</th><th>White Player</th><th>Black Player</th><th>Result (White)</th><th>Result (Black)</th></tr>";
    
    let matchId = 0;
    for (let i = 0; i < players.length; i++) {
      for (let j = i + 1; j < players.length; j++) {
        // Game 1: i has White, j has Black
        let whiteScore1 = getWhiteScore(groupName, i, j);
        let display1 = whiteScore1 === null ? "○" : (whiteScore1 === 0 ? "0" : (whiteScore1 === 0.5 ? "½" : "1"));
        
        // Game 2: j has White, i has Black (i plays Black)
        let whiteScore2 = getWhiteScore(groupName, j, i);
        let display2 = whiteScore2 === null ? "○" : (whiteScore2 === 0 ? "0" : (whiteScore2 === 0.5 ? "½" : "1"));
        
        html += `<tr>
          <td>${matchId+1}</td>
          <td><b>${escapeHtml(players[i])}</b> (White) vs <b>${escapeHtml(players[j])}</b> (Black)</td>
          <td><b>${escapeHtml(players[j])}</b> (White) vs <b>${escapeHtml(players[i])}</b> (Black)</td>
          <td><button onclick="cycleWhite('${groupName}', ${i}, ${j})">${display1}</button></td>
          <td><button onclick="cycleWhite('${groupName}', ${j}, ${i})">${display2}</button></td>
        </tr>`;
        matchId++;
      }
    }
    html += "</table>";
    
    // also add standings
    let stats = getStandings(groupName, players);
    html += "<br><h4>Standings</h4>";
    html += "<table border='1' cellpadding='3' cellspacing='0' style='border-collapse:collapse'>";
    html += "<tr><th>Rank</th><th>Player</th><th>W</th><th>D</th><th>L</th><th>Total</th></tr>";
    for (let s = 0; s < stats.length; s++) {
      html += `<tr><td>${s+1}</td><td>${escapeHtml(stats[s].name)}</td><td>${stats[s].wins}</td><td>${stats[s].draws}</td><td>${stats[s].losses}</td><td>${stats[s].points.toFixed(1)}</td></tr>`;
    }
    html += "</table>";
    
    container.innerHTML = html;
  }

  // ========== CYCLE WHITE RESULT ==========
  window.cycleWhite = function(groupName, i, j) {
    let current = getWhiteScore(groupName, i, j);
    let next = cycleScore(current);
    setWhiteScore(groupName, i, j, next);
    renderAll();
  };

  // ========== ADD / REMOVE PLAYERS ==========
  window.addMen = function() {
    let input = document.getElementById("newMenName");
    let name = input.value.trim();
    if (name && !men.some(p => p.toLowerCase() === name.toLowerCase())) {
      men.push(name);
      reinitAllScores();
      input.value = "";
      renderAll();
    } else if (name) {
      alert("Duplicate name");
    }
  };

  window.addWomen = function() {
    let input = document.getElementById("newWomenName");
    let name = input.value.trim();
    if (name && !women.some(p => p.toLowerCase() === name.toLowerCase())) {
      women.push(name);
      reinitAllScores();
      input.value = "";
      renderAll();
    } else if (name) {
      alert("Duplicate name");
    }
  };

  window.removePlayer = function(groupName, idx) {
    if (groupName === "men") {
      men.splice(idx, 1);
    } else {
      women.splice(idx, 1);
    }
    reinitAllScores();
    renderAll();
  };

  window.resetAllScores = function() {
    reinitAllScores();
    renderAll();
  };

  function renderAll() {
    renderPlayersList("menPlayers", men, "men", addMen);
    renderPlayersList("womenPlayers", women, "women", addWomen);
    renderPairings("menPairings", "men", men);
    renderPairings("womenPairings", "women", women);
  }

  // initial render
  renderAll();
</script>

</body>
</html>
